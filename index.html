<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>في البرزخ</title>
<link rel="icon" href="/images/logo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#050505;
    --panel:#0e0e0e;
    --gold:#c9a876;
    --gold-bright:#e0c496;
    --gold-dim:#8a734f;
    --wine:#6e2635;
    --mist:#a3a0987d;
    --mist2:#b8b3a8;
    --text:#ece7dc;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{font-family:'Cairo',sans-serif; background:var(--black); color:var(--text); overflow-x:hidden;}
  h1,h2,h3,.display{font-family:'Amiri',serif; font-weight:700;}
  .sr-only{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0);}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }

  nav{position:fixed; top:0; right:0; left:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:16px 6vw; background:linear-gradient(180deg, rgba(5,5,5,.85), transparent);}
  nav .brand{display:flex; align-items:center; gap:10px;}
  nav .brand img{height:34px; width:auto; display:block;}
  nav ul{list-style:none; display:flex; gap:28px; flex-wrap:wrap;}
  nav a{color:var(--text); text-decoration:none; font-size:.9rem; opacity:.8; transition:opacity .25s;}
  nav a:hover{opacity:1; color:var(--gold-bright);}

  .hero{position:relative; min-height:100vh; display:flex; align-items:flex-end; justify-content:center;}
  .hero-bg{position:absolute; inset:0; background-size:cover; background-position:center; background-image:url('/images/hero.jpg');}
  .hero-bg::after{content:""; position:absolute; inset:0; background:linear-gradient(180deg, rgba(5,5,5,.15) 0%, rgba(5,5,5,.55) 55%, rgba(5,5,5,.97) 100%);}
  .hero-inner{position:relative; z-index:2; padding:0 6vw 100px; max-width:760px; text-align:center; margin:0 auto;}
  .eyebrow{font-size:.8rem; letter-spacing:4px; color:var(--gold); margin-bottom:18px; display:block;}
  .hero p.lede{font-size:clamp(1.05rem, 2vw, 1.35rem); line-height:1.8; color:var(--mist2); max-width:620px; margin:0 auto; white-space:pre-line;}
  .scroll-hint{position:absolute; bottom:28px; left:50%; transform:translateX(-50%); font-size:.72rem; color:var(--gold-dim); letter-spacing:2px; z-index:2;}

  section.panel{padding:110px 8vw;}
  .section-head{max-width:680px; margin-bottom:60px;}
  .section-head .eyebrow{color:var(--gold);}
  .section-head h2{font-size:clamp(1.9rem, 4vw, 2.8rem); line-height:1.35;}

  .threshold{display:flex; align-items:center; gap:16px; width:100%; margin-bottom:16px;}
  .threshold::before, .threshold::after{content:""; height:1px; flex:1; background:var(--gold-dim); opacity:.4;}
  .threshold span{font-size:.7rem; letter-spacing:3px; color:var(--gold-dim);}

  .cards{display:grid; grid-template-columns:repeat(2, 1fr); gap:26px;}
  .card{position:relative; border:1px solid rgba(201,168,118,.22); border-radius:2px; overflow:hidden; background:var(--panel); transition:border-color .3s, transform .3s;}
  .card:hover{border-color:var(--gold); transform:translateY(-4px);}
  .card .thumb{width:100%; aspect-ratio:16/9; object-fit:cover; display:block;}
  .card .card-body{padding:28px 30px 32px;}
  .card .tag{font-size:.72rem; color:var(--gold); letter-spacing:2px; margin-bottom:12px; display:block;}
  .card h3{font-size:1.4rem; margin-bottom:14px; line-height:1.4;}
  .card p{color:var(--mist2); line-height:1.85; font-size:.95rem;}
  .card a.card-link{display:block; color:inherit; text-decoration:none;}

  .writer-grid{display:grid; grid-template-columns:1.3fr .7fr; gap:56px; align-items:start;}
  .writer-grid p{font-size:1.02rem; line-height:2; margin-bottom:20px; color:var(--mist2);}
  .stat-block{border-right:2px solid var(--wine); padding-right:26px;}
  .stat{margin-bottom:28px;}
  .stat .num{font-family:'Amiri',serif; font-size:2.2rem; color:var(--gold); display:block; line-height:1;}
  .stat .label{font-size:.88rem; color:var(--mist2); margin-top:6px;}

  .team-grid{display:grid; grid-template-columns:repeat(2, 1fr); gap:26px;}
  .team-card{border:1px solid rgba(201,168,118,.22); border-radius:2px; padding:30px; text-align:center; background:var(--panel);}
  .team-card img{width:88px; height:88px; border-radius:50%; object-fit:cover; margin-bottom:18px; border:1px solid rgba(201,168,118,.4);}
  .team-card h3{font-size:1.2rem; margin-bottom:6px;}
  .team-card .role{color:var(--gold); font-size:.85rem; letter-spacing:1px; margin-bottom:14px; display:block;}
  .team-card p{color:var(--mist2); line-height:1.8; font-size:.92rem;}
  .team-card a{color:var(--gold-bright); font-size:.85rem; text-decoration:none; display:inline-block; margin-top:12px;}

  .contact{background:var(--panel); text-align:center; padding:130px 8vw 90px;}
  .contact h2{font-size:clamp(2rem, 5vw, 3rem); margin-bottom:22px;}
  .contact p.lede{color:var(--mist2); max-width:520px; margin:0 auto 44px;}
  .cta-row{display:flex; gap:16px; justify-content:center; flex-wrap:wrap;}
  .btn{display:inline-flex; align-items:center; gap:10px; padding:15px 30px; border-radius:2px; text-decoration:none; font-size:.94rem; transition:all .3s;}
  .btn-primary{background:var(--gold); color:#111; font-weight:700;}
  .btn-primary:hover{background:var(--gold-bright);}
  .btn-ghost{border:1px solid rgba(201,168,118,.4); color:var(--text);}
  .btn-ghost:hover{border-color:var(--gold);}
  footer{text-align:center; padding:36px 6vw; color:var(--mist2); font-size:.78rem; letter-spacing:1px; border-top:1px solid rgba(201,168,118,.15);}
  footer img{height:20px; vertical-align:middle; margin-left:8px; opacity:.8;}

  @media (max-width:760px){
    .cards, .writer-grid, .team-grid{grid-template-columns:1fr;}
    .stat-block{border-right:none; border-top:2px solid var(--wine); padding-right:0; padding-top:20px; display:flex; gap:34px;}
    nav ul{gap:14px; font-size:.82rem;}
    section.panel{padding:80px 7vw;}
  }
</style>
</head>
<body>

<nav>
  <div class="brand"><img src="/images/logo.jpg" alt="في البرزخ"></div>
  <ul>
    <li><a href="#channel">القناة</a></li>
    <li><a href="#articles">المقالات</a></li>
    <li><a href="#works">الأعمال</a></li>
    <li><a href="#writer">الكاتب</a></li>
    <li><a href="#team">الفريق</a></li>
    <li><a href="#contact">تواصل</a></li>
  </ul>
</nav>

<header class="hero">
  <div class="hero-bg"></div>
  <h1 class="sr-only">في البرزخ</h1>
  <div class="hero-inner">
    <span class="eyebrow" id="hero_eyebrow"></span>
    <p class="lede" id="hero_lede"></p>
  </div>
  <div class="scroll-hint">اعبر ↓</div>
</header>

<section id="channel" class="panel">
  <div class="section-head">
    <div class="threshold"><span>القناة</span></div>
    <span class="eyebrow" id="channel_eyebrow"></span>
    <h2 id="channel_title"></h2>
  </div>
  <div class="cards" id="episodes-container"></div>
</section>

<section id="articles" class="panel">
  <div class="section-head">
    <div class="threshold"><span>مقالات</span></div>
    <span class="eyebrow" id="articles_eyebrow"></span>
    <h2 id="articles_title"></h2>
  </div>
  <div class="cards" id="articles-container"></div>
</section>

<section id="works" class="panel">
  <div class="section-head">
    <div class="threshold"><span>الأعمال الأدبية</span></div>
    <span class="eyebrow" id="works_eyebrow"></span>
    <h2 id="works_title"></h2>
  </div>
  <div class="cards" id="works-container"></div>
</section>

<section id="writer" class="panel">
  <div class="section-head">
    <div class="threshold"><span>الكاتب</span></div>
    <span class="eyebrow" id="writer_eyebrow"></span>
    <h2 id="writer_title"></h2>
  </div>
  <div class="writer-grid">
    <div>
      <p id="writer_bio_1"></p>
      <p id="writer_bio_2"></p>
    </div>
    <div class="stat-block">
      <div class="stat"><span class="num" id="stat_novels_num"></span><div class="label" id="stat_novels_label"></div></div>
      <div class="stat"><span class="num" id="stat_years_num"></span><div class="label" id="stat_years_label"></div></div>
      <div class="stat"><span class="num" id="stat_plays_num"></span><div class="label" id="stat_plays_label"></div></div>
    </div>
  </div>
</section>

<section id="team" class="panel">
  <div class="section-head">
    <div class="threshold"><span>الفريق</span></div>
    <h2>من يقف خلف البرزخ</h2>
  </div>
  <div class="team-grid" id="team-container"></div>
</section>

<section id="contact" class="contact">
  <span class="eyebrow">قبل أن تُغادر</span>
  <h2 id="contact_title"></h2>
  <p class="lede" id="contact_lede"></p>
  <div class="cta-row" id="contact-links"></div>
</section>

<footer>
  <img src="/images/logo.jpg" alt="">
  © <span id="year"></span> في البرزخ — جميع الأفكار محفوظة لصاحبها
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

function setText(id, value){
  const el = document.getElementById(id);
  if(el && value !== undefined) el.textContent = value;
}

function cardHTML(item){
  const inner = `
    <div class="thumb-wrap">
      <img class="thumb" src="${item.image || '/images/hero.jpg'}" alt="${item.title || ''}" loading="lazy">
    </div>
    <div class="card-body">
      <span class="tag">${item.tag || ''}</span>
      <h3>${item.title || ''}</h3>
      <p>${item.description || ''}</p>
    </div>`;
  if(item.link){
    return `<div class="card"><a class="card-link" href="${item.link}" target="_blank" rel="noopener">${inner}</a></div>`;
  }
  return `<div class="card">${inner}</div>`;
}

function renderCards(containerId, items){
  const container = document.getElementById(containerId);
  if(!container || !Array.isArray(items)) return;
  container.innerHTML = items.map(cardHTML).join('');
}

function renderTeam(items){
  const container = document.getElementById('team-container');
  if(!container || !Array.isArray(items)) return;
  container.innerHTML = items.map(m => `
    <div class="team-card">
      <img src="${m.photo || '/images/logo.jpg'}" alt="${m.name || ''}">
      <h3>${m.name || ''}</h3>
      <span class="role">${m.role || ''}</span>
      <p>${m.bio || ''}</p>
      ${m.link ? `<a href="${m.link}" target="_blank" rel="noopener">تواصل ↗</a>` : ''}
    </div>
  `).join('');
}

fetch('/content/site.json').then(r => r.json()).then(site => {
  setText('hero_eyebrow', site.hero_eyebrow);
  setText('hero_lede', site.hero_lede);
  setText('channel_eyebrow', site.channel_eyebrow);
  setText('channel_title', site.channel_title);
  setText('articles_eyebrow', site.articles_eyebrow);
  setText('articles_title', site.articles_title);
  setText('works_eyebrow', site.works_eyebrow);
  setText('works_title', site.works_title);
  setText('writer_eyebrow', site.writer_eyebrow);
  setText('writer_title', site.writer_title);
  setText('writer_bio_1', site.writer_bio_1);
  setText('writer_bio_2', site.writer_bio_2);
  setText('stat_novels_num', site.stat_novels_num);
  setText('stat_novels_label', site.stat_novels_label);
  setText('stat_years_num', site.stat_years_num);
  setText('stat_years_label', site.stat_years_label);
  setText('stat_plays_num', site.stat_plays_num);
  setText('stat_plays_label', site.stat_plays_label);
  setText('contact_title', site.contact_title);
  setText('contact_lede', site.contact_lede);

  const links = document.getElementById('contact-links');
  let linksHTML = '';
  if(site.youtube_url) linksHTML += `<a href="${site.youtube_url}" class="btn btn-primary" target="_blank" rel="noopener">اشترك في القناة ↗</a>`;
  if(site.email) linksHTML += `<a href="mailto:${site.email}" class="btn btn-ghost">راسلني ↗</a>`;
  if(site.facebook_url) linksHTML += `<a href="${site.facebook_url}" class="btn btn-ghost" target="_blank" rel="noopener">فيسبوك ↗</a>`;
  if(site.instagram_url) linksHTML += `<a href="${site.instagram_url}" class="btn btn-ghost" target="_blank" rel="noopener">انستجرام ↗</a>`;
  if(site.twitter_url) linksHTML += `<a href="${site.twitter_url}" class="btn btn-ghost" target="_blank" rel="noopener">X ↗</a>`;
  links.innerHTML = linksHTML;
}).catch(err => console.error('failed to load site.json', err));

fetch('/content/episodes.json').then(r => r.json()).then(data => renderCards('episodes-container', data.episodes)).catch(e => console.error(e));fetch('/content/articles.json').then(r => r.json()).then(data => renderCards('articles-container', data.articles)).catch(e => console.error(e));
  fetch('/content/articles.json').then(r => r.json()).then(data => renderCards('articles-container', data.articles)).catch(e => console.error(e));
fetch('/content/works.json').then(r => r.json()).then(data => renderCards('works-container', data.works)).catch(e => console.error(e));
fetch('/content/team.json').then(r => r.json()).then(data =>  renderTeam(data.team)).catch(e => console.error(e));
</script>

</body>
</html>
